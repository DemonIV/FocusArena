<!-- @dsCard group="Shop" name="Profil — Çerçeve Mağazası" -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    padding: 28px;
    color: #e2e8f0;
    max-width: 440px;
  }
  .hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .title { font-size: 11px; letter-spacing: 2px; color: #64748b; font-weight: 700; }
  .coins {
    background: rgba(255,215,0,0.10);
    border: 1px solid rgba(255,215,0,0.35);
    color: #ffd700; font-size: 13px; font-weight: 800;
    padding: 5px 12px; border-radius: 20px;
  }
  .rowscroll { display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 8px; }
  .card {
    min-width: 96px; width: 96px;
    background: rgba(255,255,255,0.05);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 12px 8px;
    text-align: center;
  }
  .card.sel { border-color: #00d2ff; background: #00d2ff0d; }
  .card.locked { opacity: 0.75; }
  .pv { position: relative; width: 52px; height: 52px; margin: 0 auto 8px; display: grid; place-items: center; }
  .pvring { width: 40px; height: 40px; border-radius: 50%; border: 3.5px solid; background: rgba(255,255,255,0.03); }
  .pvring2 { position: absolute; width: 52px; height: 52px; border-radius: 50%; border: 1.5px solid; }
  .nm { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  .st { font-size: 11px; font-weight: 600; color: #94a3b8; }
  .st.sel { color: #00d2ff; }
  .pr { font-size: 11px; font-weight: 800; color: #ffd700; }
  .pr.cant { color: #64748b; }
  .hint { color: #64748b; font-size: 11px; margin-top: 10px; }
</style>
</head>
<body>

<div class="hdr">
  <div class="title">ÇERÇEVE MAĞAZASI</div>
  <div class="coins">🪙 2.450</div>
</div>

<div class="rowscroll">
  <div class="card">
    <div class="pv"><div class="pvring" style="border-color:#00d2ff;"></div></div>
    <div class="nm">Varsayılan</div><div class="st">Seç</div>
  </div>
  <div class="card">
    <div class="pv"><div class="pvring" style="border-color:#cd7f32; box-shadow:0 0 8px #cd7f32aa;"></div></div>
    <div class="nm">Bronz</div><div class="st">Seç</div>
  </div>
  <div class="card sel">
    <div class="pv"><div class="pvring" style="border-color:#c8d0dc; box-shadow:0 0 8px #c8d0dcaa;"></div></div>
    <div class="nm">Gümüş</div><div class="st sel">✓ Seçili</div>
  </div>
  <div class="card">
    <div class="pv"><div class="pvring" style="border-color:#ffd700; box-shadow:0 0 8px #ffd700aa;"></div></div>
    <div class="nm">Altın</div><div class="pr">🪙 2.000</div>
  </div>
  <div class="card locked">
    <div class="pv"><div class="pvring" style="border-color:#10b981; box-shadow:0 0 8px #34d399aa;"></div></div>
    <div class="nm">Zümrüt</div><div class="pr cant">🪙 3.000</div>
  </div>
  <div class="card locked">
    <div class="pv">
      <div class="pvring2" style="border-color:#ff2ec488;"></div>
      <div class="pvring" style="border-color:#ffd700; box-shadow:0 0 10px #ff2ec4aa;"></div>
    </div>
    <div class="nm">Efsane</div><div class="pr cant">🪙 10.000</div>
  </div>
</div>

<div class="hint">🪙 Her tamamlanan seansta XP kadar coin kazanırsın</div>

</body>
</html>
