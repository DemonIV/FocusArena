<!-- @dsCard group="Timer" name="Timer + çerçeve varyantları" -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0d1a;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    padding: 28px;
    color: #e2e8f0;
    display: flex; gap: 36px; flex-wrap: wrap; justify-content: center;
  }
  .demo { text-align: center; }
  .label { font-size: 11px; letter-spacing: 2px; color: #64748b; font-weight: 700; margin-top: 16px; }
  .outer { position: relative; width: 268px; height: 268px; display: grid; place-items: center; }
  /* cosmetic frame rings */
  .fring { position: absolute; width: 252px; height: 252px; border-radius: 50%; border: 3px solid; }
  .fring2 { position: absolute; width: 264px; height: 264px; border-radius: 50%; border: 1.5px solid; }
  /* progress ring (simulated 65%) */
  .prog {
    position: relative; width: 220px; height: 220px; border-radius: 50%;
    display: grid; place-items: center;
  }
  .hole {
    width: 192px; height: 192px; border-radius: 50%;
    background: #0d0d1a; display: grid; place-items: center; flex-direction: column;
    z-index: 2; text-align: center;
  }
  .time { font-size: 42px; font-weight: 700; letter-spacing: 1px; }
  .badge {
    display: inline-block; margin-top: 8px; font-size: 10px; font-weight: 700;
    letter-spacing: 3px; padding: 4px 12px; border-radius: 20px;
  }
</style>
</head>
<body>

  <div class="demo">
    <div class="outer">
      <div class="prog" style="background: conic-gradient(#00d2ff 0 65%, rgba(255,255,255,0.06) 65% 100%); box-shadow: 0 0 24px #00d2ff44;">
        <div class="hole">
          <div>
            <div class="time" style="color:#00d2ff;">16:15</div>
            <span class="badge" style="color:#00d2ff; background:#00d2ff18;">FOCUSING</span>
          </div>
        </div>
      </div>
    </div>
    <div class="label">VARSAYILAN</div>
  </div>

  <div class="demo">
    <div class="outer">
      <div class="fring" style="border-color:#ffd70066; box-shadow: 0 0 18px #ffd70055;"></div>
      <div class="prog" style="background: conic-gradient(#ffd700 0 65%, rgba(255,255,255,0.06) 65% 100%); box-shadow: 0 0 24px #ffd70044;">
        <div class="hole">
          <div>
            <div class="time" style="color:#ffd700;">16:15</div>
            <span class="badge" style="color:#ffd700; background:#ffd70018;">FOCUSING</span>
          </div>
        </div>
      </div>
    </div>
    <div class="label">ALTIN — 🪙 2.000</div>
  </div>

  <div class="demo">
    <div class="outer">
      <div class="fring2" style="border-color:#a78bfa55;"></div>
      <div class="fring" style="border-color:#7df9ff66; box-shadow: 0 0 18px #a78bfa66;"></div>
      <div class="prog" style="background: conic-gradient(#7df9ff 0 65%, rgba(255,255,255,0.06) 65% 100%); box-shadow: 0 0 28px #a78bfa55;">
        <div class="hole">
          <div>
            <div class="time" style="color:#7df9ff;">16:15</div>
            <span class="badge" style="color:#7df9ff; background:#7df9ff18;">FOCUSING</span>
          </div>
        </div>
      </div>
    </div>
    <div class="label">AURORA — 🪙 8.000</div>
  </div>

  <div class="demo">
    <div class="outer">
      <div class="fring2" style="border-color:#ff2ec455;"></div>
      <div class="fring" style="border-color:#ffd70066; box-shadow: 0 0 22px #ff2ec466;"></div>
      <div class="prog" style="background: conic-gradient(#ffd700 0 65%, rgba(255,255,255,0.06) 65% 100%); box-shadow: 0 0 32px #ff2ec455;">
        <div class="hole">
          <div>
            <div class="time" style="color:#ffd700;">16:15</div>
            <span class="badge" style="color:#ffd700; background:#ffd70018;">FOCUSING</span>
          </div>
        </div>
      </div>
    </div>
    <div class="label">EFSANE — 🪙 10.000</div>
  </div>

</body>
</html>
