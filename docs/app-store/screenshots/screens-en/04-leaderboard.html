<!-- @dsCard group="Store Screens EN" name="04 - Leaderboard" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_base.css">
<style>
  .tabs2 { display: flex; gap: 12px; }
  .t2 {
    flex: 1; height: 48px; border-radius: 15px;
    display: grid; place-items: center;
    font-size: 15px; font-weight: 700; color: #B9C4D8;
    background: #0F1122; border: 1px solid rgba(255,255,255,0.08);
  }
  .t2.on { border: 1.5px solid #22D3EE; color: #EDF1F7; background: rgba(34,211,238,0.05); }
  .periods { display: flex; gap: 9px; margin-top: 12px; }
  .per {
    flex: 1; height: 42px; border-radius: 13px;
    display: grid; place-items: center;
    font-size: 12.5px; font-weight: 600; color: #9AA5BA;
    background: #0F1122; border: 1px solid rgba(255,255,255,0.07);
  }
  .per.on { border: 1.5px solid #22D3EE; color: #22D3EE; }
  .rankcard {
    margin-top: 14px; display: flex; justify-content: space-between; align-items: center;
    padding: 16px 18px; border-left: 4px solid #FF5D75;
  }
  .rlabel { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: #6C7890; }
  .rtext { font-size: 17px; font-weight: 700; margin-top: 5px; }
  .rright { text-align: right; }
  .rmedal { font-size: 24px; }
  .rxp { font-size: 18px; font-weight: 800; color: #22D3EE; margin-top: 2px; }
  .lrow {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; margin-bottom: 9px;
  }
  .lrow.me { border-color: rgba(34,211,238,0.4); background: rgba(34,211,238,0.055); }
  .lmedal { width: 26px; font-size: 19px; text-align: center; }
  .lranknum { font-size: 15px; font-weight: 800; color: #6C7890; }
  .avwrap { position: relative; width: 46px; height: 46px; display: grid; place-items: center; }
  .avring { position: absolute; inset: 0; border-radius: 50%; border: 2.5px solid; }
  .avring2 { position: absolute; inset: -4px; border-radius: 50%; border: 1.5px solid; }
  .av {
    width: 37px; height: 37px; border-radius: 50%;
    background: rgba(34,211,238,0.12); color: #22D3EE;
    display: grid; place-items: center; font-size: 15px; font-weight: 700;
  }
  .linfo { flex: 1; }
  .lname { font-size: 15.5px; font-weight: 700; }
  .lname .you { color: #22D3EE; }
  .lxp { font-size: 12.5px; color: #8B96AC; margin-top: 2px; }
</style>
</head>
<body>

<div class="topzone">
  <div class="status"><span class="st-time">21:15</span>
    <span class="st-icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="7" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="6" rx="1"/><rect x="10" y="2.5" width="3" height="8.5" rx="1"/><rect x="15" y="0" width="3" height="11" rx="1" opacity=".35"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#fff"><path d="M8.5 12 12 8.2a5 5 0 0 0-7 0Z"/><path d="M8.5 5.6c1.9 0 3.7.75 5 2l2.2-2.3A10.4 10.4 0 0 0 8.5 2.4c-2.8 0-5.4 1.1-7.2 2.9L3.5 7.6a7.3 7.3 0 0 1 5-2Z" opacity=".95"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" fill="none" stroke="#fff" stroke-opacity=".4"/><rect x="2" y="2" width="14" height="8" rx="2" fill="#fff"/><path d="M23 4v4a2.2 2.2 0 0 0 0-4Z" fill="#fff" fill-opacity=".4"/></svg>
    </span>
  </div>
  <div class="hdr">Leaderboard</div>
</div>

<div class="content">
  <div class="tabs2">
    <div class="t2 on">🏆 Players</div>
    <div class="t2">🌍 Countries</div>
  </div>
  <div class="periods">
    <div class="per">Today</div>
    <div class="per on">Week</div>
    <div class="per">Month</div>
    <div class="per">All Time</div>
  </div>

  <div class="card rankcard">
    <div>
      <div class="rlabel">GLOBAL RANK</div>
      <div class="rtext">🏆 You're #3!</div>
    </div>
    <div class="rright">
      <div class="rmedal">🥉</div>
      <div class="rxp">2,840 XP</div>
    </div>
  </div>

  <div class="seclabel">GLOBAL TOP 10</div>

  <div class="card lrow">
    <span class="lmedal">🥇</span>
    <span class="avwrap"><span class="avring" style="border-color:#FFD700; box-shadow:0 0 9px rgba(255,215,0,0.5)"></span><span class="av" style="color:#FDE68A;background:rgba(255,215,0,0.10)">E</span></span>
    <span class="linfo"><div class="lname">Emma 🦄</div><div class="lxp">5,210 XP</div></span>
  </div>
  <div class="card lrow">
    <span class="lmedal">🥈</span>
    <span class="avwrap"><span class="avring2" style="border-color:rgba(255,46,196,0.5)"></span><span class="avring" style="border-color:#22D3EE"></span><span class="av">K</span></span>
    <span class="linfo"><div class="lname">Kenji</div><div class="lxp">4,870 XP</div></span>
  </div>
  <div class="card lrow me">
    <span class="lmedal">🥉</span>
    <span class="avwrap"><span class="avring" style="border-color:#22D3EE; box-shadow:0 0 9px rgba(34,211,238,0.5)"></span><span class="av">M</span></span>
    <span class="linfo"><div class="lname">maya_studies 🦄 <span class="you">(You)</span></div><div class="lxp">2,840 XP</div></span>
  </div>
  <div class="card lrow">
    <span class="lmedal"><span class="lranknum">4</span></span>
    <span class="avwrap"><span class="av" style="color:#FCA5A5;background:rgba(248,113,113,0.12)">S</span></span>
    <span class="linfo"><div class="lname">Sofia</div><div class="lxp">2,610 XP</div></span>
  </div>
  <div class="card lrow">
    <span class="lmedal"><span class="lranknum">5</span></span>
    <span class="avwrap"><span class="av" style="color:#86EFAC;background:rgba(52,211,153,0.10)">L</span></span>
    <span class="linfo"><div class="lname">Liam 🦊</div><div class="lxp">2,380 XP</div></span>
  </div>
  <div class="card lrow">
    <span class="lmedal"><span class="lranknum">6</span></span>
    <span class="avwrap"><span class="av" style="color:#C4B5FD;background:rgba(167,139,250,0.12)">A</span></span>
    <span class="linfo"><div class="lname">Ava</div><div class="lxp">1,950 XP</div></span>
  </div>
</div>

<div class="tabbar">
  <div class="tab"><span class="ic">🏠</span>Home</div>
  <div class="tab"><span class="ic">⏱️</span>Timer</div>
  <div class="tab on"><span class="ic">🏆</span>Ranks</div>
  <div class="tab"><span class="ic">🚪</span>Rooms</div>
  <div class="tab"><span class="ic">👥</span>Friends</div>
  <div class="tab"><span class="ic">👤</span>Profile</div>
</div>

</body>
</html>
